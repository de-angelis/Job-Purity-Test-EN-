// Render questions
const form = document.getElementById("testForm");

questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `
    <label>
      <input type="checkbox" name="q${i}">
       ${i + 1}. ${q}
    </label>
  `;

  form.appendChild(div);
});

// Calculate score
function calculateScore() {
  let checked = 0;

  questions.forEach((_, i) => {
    const cb = document.querySelector(`input[name="q${i}"]`);
    if (cb.checked) checked++;
  });

  const total = questions.length;
  const score = checked;

  let label = "";

  if (score > 100) label = "Sei una colonna del Job Campus";
  else if (score > 75) label = "Stai diventando un vecchio, continua così";
  else label = "Sei proprio una matricola";

  document.getElementById("result").innerText =
    `Il tuo punteggio: ${score} / ${total} — ${label}`;
}
