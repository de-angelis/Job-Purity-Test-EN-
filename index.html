    <label>

    </label>
  `;

});

// Calculate score
function calculateScore() {
  let checked = 0;

  questions.forEach((_, i) => {
    const cb = document.querySelector(`input[name="q${i}"]`);
    if (cb.checked) checked++;
  });

  const total = questions.length;
  const score = checked;

  let label = "";

  if (score > 100) label = "You are a pillar of Job Campus";
  else if (score > 75) label = "You are turning into an old-timer, keep it going";
  else label = "You are really a freshman";

  document.getElementById("result").innerText =
    `Il tuo punteggio: ${score} / ${total} — ${label}`;
